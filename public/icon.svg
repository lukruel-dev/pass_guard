<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base shape -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="112" ry="112" />

  <!-- Shield Shape -->
  <path d="M256 96 C256 96, 160 112, 128 112 C128 256, 128 352, 256 416 C384 352, 384 256, 384 112 C352 112, 256 96, 256 96 Z" fill="url(#shield-grad)" filter="url(#glow)" />

  <!-- Keyhole Drop Shadow/Inner Darker Shield -->
  <path d="M256 128 C256 128, 178 140, 155 140 C155 250, 155 330, 256 384 C357 330, 357 250, 357 140 C334 140, 256 128, 256 128 Z" fill="#0f172a" opacity="0.6" />

  <!-- The Keyhole Symbol -->
  <circle cx="256" cy="220" r="40" fill="#38bdf8" />
  <path d="M240 250 L272 250 L280 320 L232 320 Z" fill="#38bdf8" />
</svg>
